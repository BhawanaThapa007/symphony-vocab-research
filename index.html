<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony Vocabulary Learning - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #666;
            font-size: 14px;
        }
        
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .role-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .role-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .demo-accounts {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .demo-accounts h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .demo-accounts p {
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }
        
        .demo-accounts strong {
            color: #667eea;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>📚 Symphony Vocab</h1>
        <p>AI-Enhanced Vocabulary Learning</p>
        <p style="font-size: 12px; color: #999; margin-top: 5px;">Grade 4 | Research Study Version</p>
    </div>
    
    <div class="role-selector">
        <button class="role-btn active" id="studentBtn" onclick="selectRole('student')">
            👨‍🎓 Student
        </button>
        <button class="role-btn" id="teacherBtn" onclick="selectRole('teacher')">
            👨‍🏫 Teacher/Admin
        </button>
    </div>
    
    <form id="loginForm" onsubmit="login(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required placeholder="Enter your username">
        </div>
        
        <div class="form-group" id="passwordGroup">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password (admin only)">
        </div>
        
        <button type="submit" class="login-btn">Login</button>
    </form>
    
    <div class="demo-accounts">
        <h3>🎯 Demo Accounts (For Testing)</h3>
        <p>
            <strong>Students:</strong> student1, student2, student3 (no password)<br>
            <strong>Teacher/Admin:</strong> admin (password: admin123)
        </p>
    </div>
</div>

<script>
// AUTHENTICATION SYSTEM
let currentRole = 'student';

function selectRole(role) {
    currentRole = role;
    
    document.getElementById('studentBtn').classList.remove('active');
    document.getElementById('teacherBtn').classList.remove('active');
    
    if (role === 'student') {
        document.getElementById('studentBtn').classList.add('active');
        document.getElementById('passwordGroup').style.display = 'none';
        document.getElementById('password').required = false;
    } else {
        document.getElementById('teacherBtn').classList.add('active');
        document.getElementById('passwordGroup').style.display = 'block';
        document.getElementById('password').required = true;
    }
}

function login(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    
    if (currentRole === 'student') {
        // Student login (no password required)
        if (username) {
            // Create or load student account
            loginStudent(username);
        }
    } else {
        // Admin login (password required)
        if (username === 'admin' && password === 'admin123') {
            loginAdmin();
        } else {
            alert('Invalid admin credentials!');
        }
    }
}

function loginStudent(username) {
    // Load or create student profile
    let students = JSON.parse(localStorage.getItem('students') || '{}');
    
    if (!students[username]) {
        // New student - create account
        students[username] = {
            username: username,
            created: new Date().toISOString(),
            wordsLearned: 0,
            wordsMastered: 0,
            points: 0,
            level: 1,
            streak: 0,
            badges: [],
            progress: {},
            sessions: [],
            lastLogin: new Date().toISOString()
        };
        localStorage.setItem('students', JSON.stringify(students));
    } else {
        // Existing student - update last login
        students[username].lastLogin = new Date().toISOString();
        localStorage.setItem('students', JSON.stringify(students));
    }
    
    // Set current user
    localStorage.setItem('currentUser', username);
    localStorage.setItem('userRole', 'student');
    
    // Redirect to student dashboard
    window.location.href = 'student-dashboard.html';
}

function loginAdmin() {
    localStorage.setItem('currentUser', 'admin');
    localStorage.setItem('userRole', 'admin');
    window.location.href = 'admin-dashboard.html';
}

// Initialize - hide password for students by default
document.getElementById('passwordGroup').style.display = 'none';
document.getElementById('password').required = false;
</script>

</body>
</html>
