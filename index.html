<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony Vocabulary Learning System</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }
        
        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .floating-shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }
        
        .shape1 { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .shape2 { width: 120px; height: 120px; top: 60%; left: 80%; animation-delay: 2s; }
        .shape3 { width: 60px; height: 60px; top: 80%; left: 20%; animation-delay: 4s; }
        .shape4 { width: 100px; height: 100px; top: 30%; left: 70%; animation-delay: 1s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(20px); }
            50% { transform: translateY(-60px) translateX(-20px); }
            75% { transform: translateY(-30px) translateX(20px); }
        }
        
        .login-container {
            position: relative;
            z-index: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px;
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 64px; margin-bottom: 16px; }
        .logo h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p { font-size: 14px; color: #666; margin: 0; }
        
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .role-card {
            padding: 24px 16px;
            border: 3px solid #e0e0e0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .role-card:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.2);
        }
        
        .role-card.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .role-icon { font-size: 48px; margin-bottom: 12px; }
        .role-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
        .role-description { font-size: 12px; color: #666; }
        
        .login-form { display: none; }
        .login-form.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .form-group { margin-bottom: 24px; }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        
        .back-button { margin-top: 16px; text-align: center; }
        .back-link { color: #667eea; font-size: 14px; cursor: pointer; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .info-text { text-align: center; margin-top: 24px; font-size: 13px; color: #999; }
    </style>
</head>
<body>

<div class="background-animation">
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>
    <div class="floating-shape shape3"></div>
    <div class="floating-shape shape4"></div>
</div>

<div class="login-container">
    <div class="logo">
        <div class="logo-icon">📚</div>
        <h1>Symphony Vocabulary</h1>
        <p>AI-Enhanced Learning System</p>
    </div>
    
    <div id="roleSelection">
        <div class="role-selector">
            <div class="role-card" onclick="selectRole('student')">
                <div class="role-icon">👨‍🎓</div>
                <div class="role-title">Student</div>
                <div class="role-description">Learn vocabulary</div>
            </div>
            
            <div class="role-card" onclick="selectRole('admin')">
                <div class="role-icon">👩‍💼</div>
                <div class="role-title">Admin</div>
                <div class="role-description">View data</div>
            </div>
        </div>
        <div class="info-text">Select your role to continue</div>
    </div>
    
    <div id="studentForm" class="login-form">
        <form onsubmit="loginStudent(event)">
            <div class="form-group">
                <label class="form-label">What's your name?</label>
                <input type="text" id="studentName" class="form-input" placeholder="Enter your name" required>
            </div>
            <button type="submit" class="btn-login">Start Learning 🚀</button>
        </form>
        <div class="back-button">
            <a class="back-link" onclick="backToRoleSelection()">← Back</a>
        </div>
    </div>
    
    <div id="adminForm" class="login-form">
        <form onsubmit="loginAdmin(event)">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="adminUsername" class="form-input" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="adminPassword" class="form-input" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Login as Admin</button>
        </form>
        <div class="back-button">
            <a class="back-link" onclick="backToRoleSelection()">← Back</a>
        </div>
        <div class="info-text" style="margin-top: 16px;">Default: admin / admin123</div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
function selectRole(role) {
    document.getElementById('roleSelection').style.display = 'none';
    if (role === 'student') {
        document.getElementById('studentForm').classList.add('active');
        document.getElementById('studentName').focus();
    } else {
        document.getElementById('adminForm').classList.add('active');
        document.getElementById('adminUsername').focus();
    }
}

function backToRoleSelection() {
    document.getElementById('roleSelection').style.display = 'block';
    document.getElementById('studentForm').classList.remove('active');
    document.getElementById('adminForm').classList.remove('active');
}

function loginStudent(event) {
    event.preventDefault();
    const name = document.getElementById('studentName').value.trim();
    if (!name) {
        alert('Please enter your name!');
        return;
    }
    
    // Wait for scripts to load
    if (typeof window.AUTH === 'undefined') {
        alert('System is still loading. Please wait a moment and try again.');
        return;
    }
    
    try {
        window.AUTH.loginStudent(name);
        
        // Delay redirect slightly to ensure data is saved
        setTimeout(() => {
            window.location.href = 'student-dashboard.html';
        }, 100);
    } catch (error) {
        alert('Login error: ' + error.message);
        console.error('Login error:', error);
    }
}

function loginAdmin(event) {
    event.preventDefault();
    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;
    
    // Wait for scripts to load
    if (typeof window.AUTH === 'undefined') {
        alert('System is still loading. Please wait a moment and try again.');
        return;
    }
    
    try {
        const success = window.AUTH.loginAdmin(username, password);
        if (success) {
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 100);
        } else {
            alert('Invalid credentials! Default is:\nUsername: admin\nPassword: admin123');
        }
    } catch (error) {
        alert('Login error: ' + error.message);
        console.error('Admin login error:', error);
    }
}
</script>
    </div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

        document.getElementById('studentForm').classList.add('active');

    document.getElementById('roleSelection').style.display = 'block';
    document.getElementById('studentForm').classList.remove('active');

    event.preventDefault();
    
    const nameInput = document.getElementById('studentName');

    if (!name) {

        alert('System is still loading. Please wait a moment and try again.');
        setTimeout(() => location.reload(), 1000);

        window.AUTH.loginStudent(name);
        
        // Wait a bit before redirect
        setTimeout(() => {
            window.location.href = 'student-dashboard.html';
        }, 300);
        
    } catch (error) {
        alert('Login error: ' + error.message);
        console.error('Full error:', error);
    }
}

function loginAdmin(event) {
    event.preventDefault();
    
    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;
    
    // Wait for AUTH to be available
    if (typeof window.AUTH === 'undefined' || typeof window.SYMPHONY_CONFIG === 'undefined') {
        alert('System is still loading. Please wait a moment and try again.');
        setTimeout(() => location.reload(), 1000);
        return;
    }
    
    try {
        const success = window.AUTH.loginAdmin(username, password);
        
        if (success) {
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 300);
        } else {
            alert('Invalid credentials!\n\nDefault login:\nUsername: admin\nPassword: admin123');
        }
    } catch (error) {
        alert('Login error: ' + error.message);
        console.error('Full error:', error);
    }
}

// Ensure scripts are loaded
window.addEventListener('load', function() {
    console.log('Page loaded. AUTH available:', typeof window.AUTH !== 'undefined');
    console.log('CONFIG available:', typeof window.SYMPHONY_CONFIG !== 'undefined');
});
</script>
